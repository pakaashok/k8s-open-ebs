apiVersion: apps/v1
kind: Deployment
metadata:
  name: openebs-localpv-provisioner
  namespace: openebs
  labels:
    app: openebs-localpv-provisioner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openebs-localpv-provisioner
  template:
    metadata:
      labels:
        app: openebs-localpv-provisioner
    spec:
      serviceAccountName: openebs-localpv-provisioner
      containers:
        - name: provisioner
          image: openebs/provisioner-localpv:3.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OPENEBS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPENEBS_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: OPENEBS_IO_BASEPATH
              value: "/var/openebs/local"
            - name: OPENEBS_IO_ENABLE_ANALYTICS
              value: "false"
            - name: OPENEBS_IO_INSTALLER_TYPE
              value: "manual"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - test `pgrep -c "provisioner-localpv"` = 1
            initialDelaySeconds: 30
            periodSeconds: 60
